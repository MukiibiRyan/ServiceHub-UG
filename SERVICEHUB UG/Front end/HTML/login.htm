<html>
<head>
  <title>Login - ServiceHub UG</title>
  <link rel="stylesheet" href="../CSS/login.css">
</head>
<body>
  <header class="login-header">
    <h1>ServiceHub UG</h1>
    <P>Best technicians you can trust</P>
  </header>
  <div class="form-container">
<form id="loginForm" class="form">
    <h2>Login</h2>
    <div class="form-group">
      <label for="email">Username Or Email:</label>
      <input type="email" id="email" placeholder="Username/Email" required>
    </div>

    <div class="form-group">
      <label for="password">Password:</label>
      <input type="password" id="password" placeholder="Password" required>
    </div>

    <div class="form-group role-group">
      <label>Select Your Role:</label>
      <div class="role-options">
        <div class="role-option">
          <input type="radio" id="roleClient" name="role" value="client" checked>
          <label for="roleClient">Client</label>
        </div>
        <div class="role-option">
          <input type="radio" id="roleTechnician" name="role" value="technician">
          <label for="roleTechnician">Technician</label>
        </div>
        <div class="role-option">
          <input type="radio" id="roleAdmin" name="role" value="admin">
          <label for="roleAdmin">Admin</label>
        </div>
      </div>
    </div>

    <div class="checkbox-group">
      <label class="checkbox-label">
        <input type="checkbox" id="showPassword">
        <span>Show Password</span>
      </label>
      <label class="checkbox-label">
        <input type="checkbox" id="rememberMe">
        <span>Remember me</span>
      </label>
    </div>

    <a href="forgot-password.html" class="forgot-password-link">Forgot Password?</a>
    
    <div class="button-container">
      <button type="submit">Login</button>
      <button type="reset">Reset</button>
    </div>
  </form>

  <div class="register-section">
    <p>Don't have an account?</p>
    <a href="register.htm" class="register-btn">Create Account</a>
  </div>

  <script src="../JS/login.js"></script>
</body>
</html>
